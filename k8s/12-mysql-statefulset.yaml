apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: mysql
  namespace: abaad
spec:
  serviceName: mysql
  replicas: 1
  selector:
    matchLabels:
      app: mysql
  template:
    metadata:
      labels:
        app: mysql
    spec:
      containers:
      - name: mysql
        image: mysql:8.0
        ports:
        - containerPort: 3306
          name: mysql

        envFrom:
        - secretRef:
            name: mysql-secret

        volumeMounts:
        - name: mysql-data
          mountPath: /var/lib/mysql
        - name: mysql-config
          mountPath: /etc/mysql/conf.d/custom.cnf
          subPath: my.cnf

        resources:
          requests:
            memory: "512Mi"
            cpu: "250m"
          limits:
            memory: "1Gi"
            cpu: "1000m"

        # يتأكد MySQL شغال وجاهز يستقبل اتصالات
        readinessProbe:
          exec:
            command:
            - bash
            - "-c"
            - mysqladmin ping -h 127.0.0.1 -u root -p$MYSQL_ROOT_PASSWORD
          initialDelaySeconds: 20
          periodSeconds: 10
          timeoutSeconds: 5

        livenessProbe:
          exec:
            command:
            - bash
            - "-c"
            - mysqladmin ping -h 127.0.0.1 -u root -p$MYSQL_ROOT_PASSWORD
          initialDelaySeconds: 30
          periodSeconds: 20
          timeoutSeconds: 5

      volumes:
      - name: mysql-config
        configMap:
          name: mysql-config

  # ── هذا الجزء هو سر StatefulSet — كل replica يحصل على PVC خاص به ──
  volumeClaimTemplates:
  - metadata:
      name: mysql-data
    spec:
      accessModes: ["ReadWriteOnce"]
      storageClassName: local-path
      resources:
        requests:
          storage: 20Gi
