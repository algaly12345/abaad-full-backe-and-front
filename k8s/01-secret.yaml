# ─────────────────────────────────────────────────────────────────
# استبدل القيم أدناه بقيمك الحقيقية قبل التطبيق
# لا ترفع هذا الملف على GitHub — أضفه لـ .gitignore
# ─────────────────────────────────────────────────────────────────
apiVersion: v1
kind: Secret
metadata:
  name: laravel-secret
  namespace: abaad
type: Opaque
stringData:
  APP_KEY: "base64:REPLACE_WITH_php_artisan_key_generate_OUTPUT"
  APP_URL: "https://api.yourapp.com"

  DB_CONNECTION: "mysql"
  DB_HOST: "mysql.abaad.svc.cluster.local"
  DB_PORT: "3306"
  DB_DATABASE: "abaad_db"
  DB_USERNAME: "abaad_user"
  DB_PASSWORD: "REPLACE_WITH_SAME_MYSQL_PASSWORD_FROM_10-mysql-secret.yaml"

  REDIS_HOST: "REPLACE_WITH_YOUR_REDIS_HOST"
  REDIS_PORT: "6379"
  REDIS_PASSWORD: ""

  CACHE_DRIVER: "redis"
  QUEUE_CONNECTION: "redis"
  SESSION_DRIVER: "redis"
