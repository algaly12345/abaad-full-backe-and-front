apiVersion: v1
kind: Secret
metadata:
  name: mysql-secret
  namespace: abaad
type: Opaque
stringData:
  MYSQL_ROOT_PASSWORD: "REPLACE_WITH_STRONG_ROOT_PASSWORD"
  MYSQL_DATABASE: "abaad_db"
  MYSQL_USER: "abaad_user"
  MYSQL_PASSWORD: "REPLACE_WITH_STRONG_USER_PASSWORD"
